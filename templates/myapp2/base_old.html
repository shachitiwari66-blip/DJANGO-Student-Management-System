{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="{% static 'myapp2/dashboard.css' %}">
</head>

<body>

{% if user.is_authenticated %}

  <!-- Authenticated layout: Sidebar + Topbar -->
  <div class="d-flex app-shell">

    <aside class="sidebar">
      <div class="brand px-3 py-3">
        <div class="brand-title">School <span>Management</span></div>
      </div>

      <nav class="px-2">
        <a class="side-link active" href="{% url 'student_list' %}">🏠 Dashboard</a>
        <a class="side-link" href="{% url 'student_list' %}">👥 Students</a>
      </nav>
    </aside>

    <div class="flex-grow-1">
      <nav class="topbar d-flex align-items-center justify-content-between px-4">
        <div class="topbar-title">DEPARTMENT OF DATA SCIENCE</div>

        <div class="dropdown">
          <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            {{ user.username }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <form method="post" action="{% url 'logout' %}" class="px-3 py-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 btn-sm">Logout</button>
              </form>
            </li>
          </ul>
        </div>
      </nav>

      <main class="p-4">
        <div class="content-card">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>

  </div>

{% else %}

  <!-- Public layout: No sidebar -->
  <div class="public-shell">

    <nav class="topbar d-flex align-items-center justify-content-between px-4">
      <div class="topbar-title">DEPARTMENT OF DATA SCIENCE</div>
      <a href="{% url 'login' %}" class="btn btn-light btn-sm">Login</a>
    </nav>

    <main class="p-4">
      <div class="content-card">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

{% endif %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
