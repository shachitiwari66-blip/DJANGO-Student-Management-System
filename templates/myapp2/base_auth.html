{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="{% static 'myapp2/dashboard.css' %}">
</head>

<body>

<div class="d-flex app-shell">

  <!-- =========================
       MOBILE HAMBURGER BUTTON
  ========================== -->
  <button class="btn btn-dark d-lg-none mobile-menu-btn"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#mobileSidebar"
          aria-controls="mobileSidebar">
    ☰
  </button>

  <!-- =========================
       DESKTOP SIDEBAR
  ========================== -->
  <aside class="sidebar d-none d-lg-block">
    <div class="brand px-3 py-3">
      <div class="brand-title">
        School <span>Management</span>
      </div>
    </div>

    <nav class="px-2">
      <!-- Dashboard -->
      <a class="side-link {% if request.resolver_match.url_name == 'student_list' %}active{% endif %}"
         href="{% url 'student_list' %}">
        🏠 Dashboard
      </a>

      <!-- Students (FULL LIST PAGE) -->
      <a class="side-link {% if request.resolver_match.url_name == 'students_page' %}active{% endif %}"
         href="{% url 'students_page' %}">
        👥 Students
      </a>
    </nav>
  </aside>

  <!-- =========================
       MOBILE OFFCANVAS SIDEBAR
  ========================== -->
  <div class="offcanvas offcanvas-start d-lg-none sidebar-offcanvas"
       tabindex="-1"
       id="mobileSidebar">

    <div class="offcanvas-header">
      <h5 class="offcanvas-title brand-title m-0">
        School <span>Management</span>
      </h5>
      <button type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas">
      </button>
    </div>

    <div class="offcanvas-body px-2">
      <a class="side-link {% if request.resolver_match.url_name == 'student_list' %}active{% endif %}"
         data-bs-dismiss="offcanvas"
         href="{% url 'student_list' %}">
         🏠 Dashboard
      </a>

      <a class="side-link {% if request.resolver_match.url_name == 'students_page' %}active{% endif %}"
         data-bs-dismiss="offcanvas"
         href="{% url 'students_page' %}">
         👥 Students
      </a>
    </div>
  </div>

  <!-- =========================
       MAIN CONTENT AREA
  ========================== -->
  <div class="flex-grow-1 main-area">

    <!-- Topbar -->
    <nav class="topbar d-flex align-items-center justify-content-between px-4">
      <div class="topbar-title">
        DEPARTMENT OF DATA SCIENCE
      </div>

      {% if user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-outline-light btn-sm" type="submit">
          Logout
        </button>
      </form>
      {% else %}
      <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
        Login
      </a>
      {% endif %}
    </nav>

    <!-- Page Content -->
    <main class="p-4">
      <div class="content-card">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
